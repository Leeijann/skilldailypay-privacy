<!DOCTYPE html>
<html>
<head><title>TikTok Auth Callback</title></head>
<body>
<h1>TikTok Authorization</h1>
<p id="status">Reading authorization code...</p>
<p><strong>Your auth code:</strong></p>
<textarea id="code" rows="4" cols="60" readonly style="font-size:16px;"></textarea>
<p>Copy the code above and paste it in your terminal.</p>
<script>
const params = new URLSearchParams(window.location.search);
const code = params.get('code');
const error = params.get('error');
if (error) {
  document.getElementById('status').textContent = 'Error: ' + error + ' - ' + params.get('error_description');
} else if (code) {
  document.getElementById('code').value = code;
  document.getElementById('status').textContent = 'Success! Copy the code below:';
} else {
  document.getElementById('status').textContent = 'No authorization code found in URL.';
}
</script>
</body>
</html>
